<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>النظام البصري السريع - تحليل فوري</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            direction: rtl;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.6em;
            margin-bottom: 5px;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .camera-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 12px;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
        }

        .results-area {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px;
            max-height: 450px;
            overflow-y: auto;
            font-size: 13px;
        }

        .result-card {
            background: white;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            border-right: 4px solid #667eea;
        }

        .result-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .motion-detected {
            background: #fff3cd;
            border-right-color: #ffc107;
        }

        .text-detected {
            background: #d4edda;
            border-right-color: #28a745;
        }

        .status-bar {
            background: #e9ecef;
            padding: 8px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fps-counter {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 10px;
            font-family: monospace;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ النظام البصري السريع</h1>
        <div class="badge">🚀 تحليل فائق السرعة | كشف الحركة | التعرف على النصوص</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📷 الكاميرا والتحكم</h3>
            <div class="camera-container">
                <video id="videoElement" autoplay playsinline muted></video>
                <canvas id="canvasOverlay"></canvas>
                <div class="fps-counter" id="fpsCounter">FPS: 0</div>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="motionValue">0</div>
                    <div class="stat-label">الحركة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="brightnessValue">0</div>
                    <div class="stat-label">الإضاءة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="facesValue">0</div>
                    <div class="stat-label">الوجوه</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="textsValue">0</div>
                    <div class="stat-label">النصوص</div>
                </div>
            </div>

            <div class="controls">
                <button id="startMotionBtn" class="btn-success">▶️ تشغيل</button>
                <button id="stopMotionBtn" class="btn-danger">⏹️ إيقاف</button>
                <button id="ocrBtn" class="btn-primary">🔍 قراءة النصوص</button>
                <button id="clearBtn" class="btn-warning">🗑️ مسح</button>
            </div>
            <div class="status-bar" id="statusBar">
                ✅ النظام جاهز | اضغط "تشغيل"
            </div>
        </div>

        <div class="card">
            <h3>📊 نتائج التحليل</h3>
            <div class="results-area" id="resultsArea">
                <div style="text-align: center; padding: 20px; color: #999;">
                    ✨ انتظر بدء التحليل...
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
    // ==================== العناصر ====================
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasOverlay');
    const ctx = canvas.getContext('2d');
    const startMotionBtn = document.getElementById('startMotionBtn');
    const stopMotionBtn = document.getElementById('stopMotionBtn');
    const ocrBtn = document.getElementById('ocrBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultsArea = document.getElementById('resultsArea');
    const statusBar = document.getElementById('statusBar');
    const motionValue = document.getElementById('motionValue');
    const brightnessValue = document.getElementById('brightnessValue');
    const facesValue = document.getElementById('facesValue');
    const textsValue = document.getElementById('textsValue');
    const fpsCounter = document.getElementById('fpsCounter');

    // ==================== المتغيرات ====================
    let isRunning = false;
    let animationId = null;
    let currentStream = null;
    let previousFrame = null;
    let fps = 0;
    let frameCount = 0;
    let lastFpsUpdate = 0;
    let lastMotionSum = 0;
    let lastBrightness = 0;
    
    // كشف الوجوه البسيط (باستخدام الفروق)
    let faceDetected = false;
    let lastFaceCheck = 0;
    
    // Tesseract OCR
    const worker = Tesseract.createWorker({
        logger: m => console.log(m)
    });

    // ==================== تشغيل الكاميرا ====================
    async function setupCamera() {
        try {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: "environment"
                } 
            });
            currentStream = stream;
            video.srcObject = stream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusBar.innerHTML = '✅ الكاميرا جاهزة | اضغط "تشغيل"';
                    resolve();
                };
            });
        } catch (err) {
            statusBar.innerHTML = '❌ خطأ: ' + err.message;
            console.error(err);
        }
    }

    // ==================== تحليل الصورة ====================
    function analyzeImage(frame) {
        if (!frame) return { motion: 0, brightness: 0, hasFace: false };
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        // حساب السطوع
        let sum = 0;
        for (let i = 0; i < data.length; i += 4) {
            const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
            sum += brightness;
        }
        const avgBrightness = sum / (data.length / 4);
        
        // كشف الحركة (مقارنة مع الإطار السابق)
        let motion = 0;
        if (previousFrame) {
            let motionSum = 0;
            const prevData = previousFrame.data;
            for (let i = 0; i < data.length; i += 4) {
                const diff = Math.abs(data[i] - prevData[i]) + 
                           Math.abs(data[i+1] - prevData[i+1]) + 
                           Math.abs(data[i+2] - prevData[i+2]);
                if (diff > 30) motionSum++;
            }
            motion = (motionSum / (data.length / 4)) * 100;
        }
        
        // كشف بسيط للوجوه (البحث عن مناطق دائرية ذات لون بشرة)
        let hasFace = false;
        if (avgBrightness > 50 && avgBrightness < 200) {
            // كشف لون البشرة التقريبي
            let skinPixels = 0;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                // نطاق لون البشرة التقريبي
                if (r > 80 && r < 255 && g > 40 && g < 200 && b > 20 && b < 180 && r > g && r > b) {
                    skinPixels++;
                }
            }
            const skinRatio = skinPixels / (data.length / 4);
            hasFace = skinRatio > 0.05 && skinRatio < 0.3;
        }
        
        // حفظ الإطار الحالي
        previousFrame = imageData;
        
        return { motion, brightness: avgBrightness, hasFace };
    }

    // ==================== كشف الوجوه المتقدم ====================
    async function detectFaces() {
        // استخدام طريقة بسيطة للكشف عن الوجوه عبر Canvas API
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        // البحث عن مناطق مشرقة بشكل دائري (تقريب الوجه)
        let faceCount = 0;
        const step = 20;
        for (let y = 0; y < canvas.height; y += step) {
            for (let x = 0; x < canvas.width; x += step) {
                const idx = (y * canvas.width + x) * 4;
                const r = imageData.data[idx];
                const g = imageData.data[idx+1];
                const b = imageData.data[idx+2];
                
                // فحص لون البشرة
                if (r > 100 && r < 250 && g > 50 && g < 200 && b > 30 && b < 180 && r > g && r > b) {
                    faceCount++;
                }
            }
        }
        
        return Math.min(Math.floor(faceCount / 50), 5);
    }

    // ==================== OCR ====================
    async function performOCR() {
        statusBar.innerHTML = '📖 جاري قراءة النصوص...';
        ocrBtn.disabled = true;
        
        try {
            await worker.load();
            await worker.loadLanguage('ara+eng');
            await worker.initialize('ara+eng');
            
            // التقاط صورة من الفيديو
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            
            const { data: { text } } = await worker.recognize(imageData);
            
            if (text && text.trim().length > 0) {
                addResult('ocr', `📝 النص المقروء:`, text);
                textsValue.innerText = text.split(' ').length;
            } else {
                addResult('ocr', '📝 قراءة النصوص', 'لم يتم العثور على نصوص واضحة');
                textsValue.innerText = '0';
            }
            
            statusBar.innerHTML = '✅ تمت قراءة النصوص بنجاح';
        } catch (error) {
            console.error('OCR Error:', error);
            statusBar.innerHTML = '❌ خطأ في قراءة النصوص';
            addResult('error', 'خطأ', 'حدث خطأ أثناء قراءة النصوص');
        } finally {
            ocrBtn.disabled = false;
            setTimeout(() => {
                if (isRunning) statusBar.innerHTML = '🟢 التحليل يعمل';
                else statusBar.innerHTML = '⏹️ متوقف';
            }, 2000);
        }
    }

    // ==================== إضافة نتيجة ====================
    function addResult(type, title, content) {
        const resultDiv = document.createElement('div');
        resultDiv.className = 'result-card';
        if (type === 'motion') resultDiv.classList.add('motion-detected');
        if (type === 'ocr') resultDiv.classList.add('text-detected');
        
        const time = new Date().toLocaleTimeString('ar-EG');
        
        resultDiv.innerHTML = `
            <div class="result-title">${title}</div>
            <div style="font-size: 12px; color: #666; margin-bottom: 5px;">🕒 ${time}</div>
            <div>${content}</div>
        `;
        
        resultsArea.insertBefore(resultDiv, resultsArea.firstChild);
        
        // الاحتفاظ فقط بآخر 20 نتيجة
        while (resultsArea.children.length > 20) {
            resultsArea.removeChild(resultsArea.lastChild);
        }
    }

    // ==================== تحديث الواجهة بالحركة ====================
    function updateMotionUI(motion, brightness, faces) {
        // تحديث القيم
        motionValue.innerText = Math.round(motion);
        brightnessValue.innerText = Math.round(brightness);
        facesValue.innerText = faces;
        
        // تغيير الألوان حسب الحركة
        if (motion > 15) {
            motionValue.style.color = '#ff6b6b';
            if (lastMotionSum < 15 && motion > 15) {
                addResult('motion', '🔴 حركة مكتشفة!', `تم اكتشاف حركة بنسبة ${Math.round(motion)}% في المشهد`);
            }
        } else {
            motionValue.style.color = '#667eea';
        }
        
        // تغيير لون السطوع
        if (brightness < 80) {
            brightnessValue.style.color = '#ff6b6b';
        } else if (brightness > 180) {
            brightnessValue.style.color = '#ffc107';
        } else {
            brightnessValue.style.color = '#28a745';
        }
        
        lastMotionSum = motion;
        lastBrightness = brightness;
    }

    // ==================== حلقة التحليل الرئيسية ====================
    async function analysisLoop() {
        if (!isRunning) return;
        
        const startTime = performance.now();
        
        try {
            // رسم الإطار الحالي على canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // تحليل الصورة
            const analysis = analyzeImage();
            
            // كشف الوجوه
            const faceCount = await detectFaces();
            
            // تحديث الواجهة
            updateMotionUI(analysis.motion, analysis.brightness, faceCount);
            
            // تحديث FPS
            frameCount++;
            const now = performance.now();
            if (now - lastFpsUpdate >= 1000) {
                fps = frameCount;
                fpsCounter.innerText = `FPS: ${fps}`;
                frameCount = 0;
                lastFpsUpdate = now;
            }
            
            // عرض معلومات إضافية على canvas
            ctx.font = '14px Cairo';
            ctx.fillStyle = '#00ff00';
            ctx.shadowBlur = 0;
            ctx.fillText(`الحركة: ${Math.round(analysis.motion)}%`, 10, 30);
            ctx.fillStyle = analysis.brightness < 100 ? '#ff6b6b' : '#00ff00';
            ctx.fillText(`الإضاءة: ${Math.round(analysis.brightness)}`, 10, 55);
            if (faceCount > 0) {
                ctx.fillStyle = '#ffd700';
                ctx.fillText(`👤 ${faceCount} وجه محتمل`, 10, 80);
            }
            
        } catch (error) {
            console.error('Analysis error:', error);
        }
        
        // استدعاء الحلقة التالية
        if (isRunning) {
            requestAnimationFrame(() => analysisLoop());
        }
    }

    // ==================== بدء التحليل ====================
    function startAnalysis() {
        if (isRunning) return;
        
        isRunning = true;
        startMotionBtn.disabled = true;
        stopMotionBtn.disabled = false;
        
        statusBar.innerHTML = '🟢 التحليل يعمل - كشف الحركة والوجوه';
        
        // إعادة تعيين الإطار السابق
        previousFrame = null;
        
        // بدء الحلقة
        analysisLoop();
    }

    // ==================== إيقاف التحليل ====================
    function stopAnalysis() {
        isRunning = false;
        startMotionBtn.disabled = false;
        stopMotionBtn.disabled = true;
        
        statusBar.innerHTML = '⏹️ التحليل متوقف';
        
        // مسح canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        motionValue.innerText = '0';
        brightnessValue.innerText = '0';
        fpsCounter.innerText = 'FPS: 0';
    }

    // ==================== مسح النتائج ====================
    function clearResults() {
        resultsArea.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">✨ تم مسح النتائج</div>';
        textsValue.innerText = '0';
        statusBar.innerHTML = '🗑️ تم مسح النتائج';
        setTimeout(() => {
            if (isRunning) statusBar.innerHTML = '🟢 التحليل يعمل';
            else statusBar.innerHTML = '⏹️ متوقف';
        }, 1500);
    }

    // ==================== تهيئة Tesseract ====================
    async function initOCR() {
        try {
            await worker.load();
            await worker.loadLanguage('ara+eng');
            await worker.initialize('ara+eng');
            console.log('OCR initialized');
        } catch (error) {
            console.error('OCR init error:', error);
        }
    }

    // ==================== التشغيل ====================
    async function init() {
        await setupCamera();
        await initOCR();
        
        // إضافة مستمعي الأحداث
        startMotionBtn.addEventListener('click', startAnalysis);
        stopMotionBtn.addEventListener('click', stopAnalysis);
        ocrBtn.addEventListener('click', performOCR);
        clearBtn.addEventListener('click', clearResults);
        
        // عرض الإطار الأول
        function drawInitial() {
            if (video.readyState === 4 && !isRunning) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(drawInitial);
        }
        drawInitial();
    }
    
    init();
</script>
</body>
</html>
