<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>الرؤية الفائقة - تحليل فوري وسريع</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 15px;
            direction: rtl;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            margin-top: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card h3 {
            color: white;
            margin-bottom: 12px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .camera-container {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 12px;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 12px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #38ef7d;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.8;
        }

        .results-area {
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            padding: 12px;
            max-height: 450px;
            overflow-y: auto;
            color: #e0e0e0;
            line-height: 1.5;
            font-size: 13px;
        }

        .result-item {
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-right: 3px solid #38ef7d;
        }

        .result-title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 0.9em;
        }

        .face-info {
            color: #00ff00;
        }

        .object-info {
            color: #ff8888;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 11px;
            color: #aaa;
            margin-top: 8px;
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38ef7d, #11998e);
            width: 0%;
            transition: width 0.2s ease;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ الرؤية الفائقة السريعة</h1>
        <div class="badge">🚀 تحليل فوري | كشف الوجوه والمجسمات | بدون تأخير</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📷 كاميرا التحليل المباشر</h3>
            <div class="camera-container">
                <video id="videoElement" autoplay playsinline muted></video>
                <canvas id="canvasOverlay"></canvas>
            </div>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="faceCount">0</div>
                    <div class="stat-label">الوجوه</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="objectCount">0</div>
                    <div class="stat-label">المجسمات</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="fps">0</div>
                    <div class="stat-label">FPS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="status">✓</div>
                    <div class="stat-label">الحالة</div>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn-success">▶️ تشغيل التحليل</button>
                <button id="stopBtn" class="btn-danger">⏹️ إيقاف</button>
                <button id="snapshotBtn" class="btn-primary">📸 التقاط تقرير</button>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text" id="statusText">✅ جاهز | اضغط "تشغيل التحليل"</div>
        </div>

        <div class="card">
            <h3>📊 التحليل الفوري</h3>
            <div class="results-area" id="resultsArea">
                <div style="text-align: center; padding: 20px; color: #888;">
                    🔍 قم بتشغيل الكاميرا لبدء التحليل الفوري
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2"></script>

<script>
    // ==================== العناصر ====================
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasOverlay');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const snapshotBtn = document.getElementById('snapshotBtn');
    const resultsArea = document.getElementById('resultsArea');
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const faceCountSpan = document.getElementById('faceCount');
    const objectCountSpan = document.getElementById('objectCount');
    const fpsSpan = document.getElementById('fps');
    const statusSpan = document.getElementById('status');

    // ==================== المتغيرات ====================
    let cocoModel = null;
    let isAnalyzing = false;
    let animationId = null;
    let currentStream = null;
    let lastAnalysisTime = 0;
    let fps = 0;
    let frameCount = 0;
    let lastFpsUpdate = 0;
    
    // قائمة المجسمات المعروفة
    const objectCategories = {
        'person': '👤 شخص',
        'bicycle': '🚲 دراجة',
        'car': '🚗 سيارة',
        'motorcycle': '🏍️ دراجة نارية',
        'airplane': '✈️ طائرة',
        'bus': '🚌 حافلة',
        'train': '🚂 قطار',
        'truck': '🚚 شاحنة',
        'boat': '⛵ قارب',
        'traffic light': '🚦 إشارة مرور',
        'fire hydrant': '🧯 صنبور إطفاء',
        'stop sign': '🛑 علامة قف',
        'parking meter': '🅿️ عداد مواقف',
        'bench': '🪑 مقعد',
        'bird': '🐦 طائر',
        'cat': '🐱 قط',
        'dog': '🐕 كلب',
        'horse': '🐎 حصان',
        'sheep': '🐑 خروف',
        'cow': '🐮 بقرة',
        'elephant': '🐘 فيل',
        'bear': '🐻 دب',
        'zebra': '🦓 حمار وحشي',
        'giraffe': '🦒 زرافة',
        'backpack': '🎒 حقيبة ظهر',
        'umbrella': '☔ مظلة',
        'handbag': '👜 حقيبة يد',
        'tie': '👔 ربطة عنق',
        'suitcase': '🧳 حقيبة سفر',
        'frisbee': '🥏 طبق طائر',
        'skis': '🎿 زلاجات',
        'snowboard': '🏂 لوح ثلج',
        'sports ball': '⚽ كرة رياضية',
        'kite': '🪁 طائرة ورقية',
        'baseball bat': '🏏 مضرب بيسبول',
        'baseball glove': '🥎 قفاز بيسبول',
        'skateboard': '🛹 لوح تزلج',
        'surfboard': '🏄 لوح ركمجة',
        'tennis racket': '🎾 مضرب تنس',
        'bottle': '🍾 زجاجة',
        'wine glass': '🍷 كأس نبيذ',
        'cup': '🥤 كوب',
        'fork': '🍴 شوكة',
        'knife': '🔪 سكين',
        'spoon': '🥄 ملعقة',
        'bowl': '🥣 وعاء',
        'banana': '🍌 موز',
        'apple': '🍎 تفاح',
        'sandwich': '🥪 شطيرة',
        'orange': '🍊 برتقال',
        'broccoli': '🥦 بروكلي',
        'carrot': '🥕 جزر',
        'hot dog': '🌭 هوت دوج',
        'pizza': '🍕 بيتزا',
        'donut': '🍩 دونات',
        'cake': '🍰 كعكة',
        'chair': '🪑 كرسي',
        'couch': '🛋️ أريكة',
        'potted plant': '🌿 نبات منزلي',
        'bed': '🛏️ سرير',
        'dining table': '🍽️ طاولة طعام',
        'toilet': '🚽 مرحاض',
        'tv': '📺 تلفاز',
        'laptop': '💻 حاسوب محمول',
        'mouse': '🖱️ فأرة',
        'remote': '📟 جهاز تحكم',
        'keyboard': '⌨️ لوحة مفاتيح',
        'cell phone': '📱 هاتف',
        'microwave': '🔥 ميكروويف',
        'oven': '🔥 فرن',
        'toaster': '🍞 محمصة',
        'sink': '🚰 حوض',
        'refrigerator': '🧊 ثلاجة',
        'book': '📚 كتاب',
        'clock': '🕰️ ساعة',
        'vase': '🏺 مزهرية',
        'scissors': '✂️ مقص',
        'teddy bear': '🧸 دبدوب',
        'hair drier': '💨 مجفف شعر',
        'toothbrush': '🪥 فرشاة أسنان'
    };

    // ==================== تشغيل الكاميرا ====================
    async function setupCamera() {
        try {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: "user"
                } 
            });
            currentStream = stream;
            video.srcObject = stream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusText.innerHTML = '✅ الكاميرا جاهزة';
                    statusSpan.innerHTML = '✓';
                    resolve();
                };
            });
        } catch (err) {
            statusText.innerHTML = '❌ خطأ في الكاميرا: ' + err.message;
            statusSpan.innerHTML = '✗';
            console.error(err);
        }
    }

    // ==================== تحميل النماذج ====================
    async function loadModels() {
        statusText.innerHTML = '📦 تحميل النماذج...';
        progressFill.style.width = '30%';
        
        // تحميل COCO-SSD
        cocoModel = await cocoSsd.load();
        progressFill.style.width = '60%';
        statusText.innerHTML = '📦 تحميل نموذج الوجوه...';
        
        // تحميل Face-API
        await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
        await faceapi.nets.faceExpressionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
        
        progressFill.style.width = '100%';
        statusText.innerHTML = '✅ النماذج جاهزة! اضغط "تشغيل"';
        statusSpan.innerHTML = '✓';
        
        setTimeout(() => {
            progressFill.style.width = '0%';
        }, 1000);
    }

    // ==================== تحليل الوجوه ====================
    async function detectFaces() {
        try {
            const detections = await faceapi.detectAllFaces(
                video,
                new faceapi.TinyFaceDetectorOptions()
            ).withFaceExpressions();
            
            return detections.map(d => ({
                box: d.detection.box,
                expressions: d.expressions
            }));
        } catch (e) {
            return [];
        }
    }

    // ==================== تحليل المجسمات ====================
    async function detectObjects() {
        try {
            const predictions = await cocoModel.detect(video);
            return predictions.filter(p => p.score > 0.5);
        } catch (e) {
            return [];
        }
    }

    // ==================== رسم النتائج على Canvas ====================
    function drawResults(faces, objects) {
        // مسح الـ Canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // رسم إطار الفيديو
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // رسم مربعات الوجوه
        faces.forEach(face => {
            const box = face.box;
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 3;
            ctx.strokeRect(box.x, box.y, box.width, box.height);
            
            // رسم المشاعر
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 14px Cairo';
            const topEmotion = Object.entries(face.expressions).sort((a,b) => b[1] - a[1])[0];
            const emotionText = getEmotionArabic(topEmotion[0]);
            ctx.fillText(`😊 ${emotionText}`, box.x, box.y - 5);
        });
        
        // رسم مربعات المجسمات
        objects.forEach(obj => {
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 2;
            ctx.strokeRect(obj.bbox[0], obj.bbox[1], obj.bbox[2], obj.bbox[3]);
            
            ctx.fillStyle = '#ff4444';
            ctx.font = '12px Cairo';
            const objName = objectCategories[obj.class] || obj.class;
            ctx.fillText(`${objName} ${Math.round(obj.score * 100)}%`, obj.bbox[0], obj.bbox[1] - 3);
        });
    }

    // ==================== ترجمة المشاعر ====================
    function getEmotionArabic(emotion) {
        const emotions = {
            'neutral': 'محايد',
            'happy': 'سعيد 😊',
            'sad': 'حزين 😢',
            'angry': 'غاضب 😠',
            'fearful': 'خائف 😨',
            'disgusted': 'مشمئز 🤢',
            'surprised': 'متفاجئ 😲'
        };
        return emotions[emotion] || emotion;
    }

    // ==================== تحديث واجهة النتائج ====================
    function updateResultsUI(faces, objects) {
        let html = '';
        
        // الوجوه
        if (faces.length > 0) {
            html += `<div class="result-item">
                <div class="result-title">👥 الوجوه المكتشفة (${faces.length})</div>`;
            faces.forEach((face, i) => {
                const topEmotion = Object.entries(face.expressions).sort((a,b) => b[1] - a[1])[0];
                html += `<div class="face-info">• الشخص ${i+1}: ${getEmotionArabic(topEmotion[0])} (${Math.round(topEmotion[1] * 100)}%)</div>`;
            });
            html += `</div>`;
        }
        
        // المجسمات
        if (objects.length > 0) {
            html += `<div class="result-item">
                <div class="result-title">📦 المجسمات المكتشفة (${objects.length})</div>`;
            objects.forEach(obj => {
                const objName = objectCategories[obj.class] || obj.class;
                html += `<div class="object-info">• ${objName} - ${Math.round(obj.score * 100)}%</div>`;
            });
            html += `</div>`;
        }
        
        // إذا لم يتم اكتشاف شيء
        if (faces.length === 0 && objects.length === 0) {
            html = `<div class="result-item">
                <div class="result-title">🔍 لا توجد اكتشافات</div>
                <div style="color: #888;">حاول التحرك أو وضع أشياء أمام الكاميرا</div>
            </div>`;
        }
        
        // إضافة معلومات الأداء
        html += `<div class="result-item">
            <div class="result-title">⚡ معلومات الأداء</div>
            <div>• معدل الإطارات: ${fps} FPS</div>
            <div>• وقت التحليل: ${lastAnalysisTime.toFixed(1)} ms</div>
            <div>• الحالة: ${isAnalyzing ? '🟢 يعمل' : '⏹️ متوقف'}</div>
        </div>`;
        
        resultsArea.innerHTML = html;
    }

    // ==================== حلقة التحليل الرئيسية ====================
    async function analysisLoop() {
        if (!isAnalyzing) return;
        
        const startTime = performance.now();
        
        try {
            // تنفيذ التحليل
            const [faces, objects] = await Promise.all([
                detectFaces(),
                detectObjects()
            ]);
            
            const endTime = performance.now();
            lastAnalysisTime = endTime - startTime;
            
            // تحديث الإحصائيات
            faceCountSpan.innerText = faces.length;
            objectCountSpan.innerText = objects.length;
            
            // رسم النتائج
            drawResults(faces, objects);
            
            // تحديث واجهة النتائج
            updateResultsUI(faces, objects);
            
            // تحديث FPS
            frameCount++;
            const now = performance.now();
            if (now - lastFpsUpdate >= 1000) {
                fps = frameCount;
                fpsSpan.innerText = fps;
                frameCount = 0;
                lastFpsUpdate = now;
            }
            
            statusSpan.innerHTML = '✓';
            statusText.innerHTML = '🟢 التحليل يعمل بسلاسة';
            
        } catch (error) {
            console.error('Analysis error:', error);
            statusSpan.innerHTML = '⚠️';
        }
        
        // استدعاء الحلقة التالية
        if (isAnalyzing) {
            requestAnimationFrame(() => analysisLoop());
        }
    }

    // ==================== بدء التحليل ====================
    function startAnalysis() {
        if (isAnalyzing) return;
        
        isAnalyzing = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        snapshotBtn.disabled = false;
        
        statusText.innerHTML = '🟢 التحليل يعمل...';
        statusSpan.innerHTML = '✓';
        
        // بدء الحلقة
        analysisLoop();
    }

    // ==================== إيقاف التحليل ====================
    function stopAnalysis() {
        isAnalyzing = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        
        statusText.innerHTML = '⏹️ متوقف | اضغط "تشغيل" للمتابعة';
        statusSpan.innerHTML = '⏹️';
        
        // مسح الـ Canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        resultsArea.innerHTML = '<div style="text-align: center; padding: 20px; color: #888;">⏹️ التحليل متوقف. اضغط "تشغيل" للمتابعة</div>';
    }

    // ==================== التقاط تقرير ====================
    function takeSnapshot() {
        if (!isAnalyzing) {
            statusText.innerHTML = '⚠️ قم بتشغيل التحليل أولاً';
            return;
        }
        
        // إنشاء رابط لتحميل الصورة
        const link = document.createElement('a');
        link.download = `snapshot_${new Date().toISOString().slice(0,19)}.png`;
        link.href = canvas.toDataURL();
        link.click();
        
        statusText.innerHTML = '📸 تم حفظ التقرير';
        setTimeout(() => {
            if (isAnalyzing) statusText.innerHTML = '🟢 التحليل يعمل بسلاسة';
        }, 2000);
    }

    // ==================== التشغيل ====================
    async function init() {
        await setupCamera();
        await loadModels();
        
        // إضافة مستمعي الأحداث
        startBtn.addEventListener('click', startAnalysis);
        stopBtn.addEventListener('click', stopAnalysis);
        snapshotBtn.addEventListener('click', takeSnapshot);
        
        // عرض الإطار الأول
        function drawInitialFrame() {
            if (video.readyState === 4) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(drawInitialFrame);
        }
        drawInitialFrame();
    }
    
    init();
</script>
</body>
