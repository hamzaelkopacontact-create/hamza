<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>كاميرا تحليل الأشياء</title>
    <style>
        body { font-family: Arial; text-align: center; direction: rtl; }
        video, canvas { border: 2px solid #ccc; margin: 10px; width: 80%; max-width: 600px; }
        #results { background: #f0f0f0; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>كاميرا تحليل الأشياء الذكية</h1>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <div id="results">جارٍ تحميل النموذج...</div>

    <!-- استيراد مكتبة TensorFlow.js والنموذج -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

    <script>
        // 1. إعداد الكاميرا
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const resultsDiv = document.getElementById('results');

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        // ضبط حجم canvas ليطابق الفيديو
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        resolve(video);
                    };
                });
            } catch (err) {
                resultsDiv.innerText = "لا يمكن الوصول للكاميرا: " + err;
            }
        }

        // 2. تحميل نموذج الذكاء الاصطناعي
        async function loadModel() {
            resultsDiv.innerText = "جارٍ تحميل نموذج التعرف...";
            const model = await cocoSsd.load();
            resultsDiv.innerText = "النموذج جاهز! انتظر التحليل...";
            return model;
        }

        // 3. تحليل الإطار الحالي من الكاميرا
        async function detectFrame(model) {
            // رسم إطار الفيديو على الـ canvas لالتقاط الصورة
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // تحليل الصورة من الـ canvas
            const predictions = await model.detect(canvas);
            
            // عرض النتائج
            displayResults(predictions);
            
            // تكرار العملية كل ثانية (للتحليل المستمر)
            setTimeout(() => detectFrame(model), 1000);
        }

        // 4. عرض النتائج على الشاشة
        function displayResults(predictions) {
            // مسح الـ canvas لإعادة الرسم
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height); // رسم الفيديو من جديد
            
            let resultsText = "تم التعرف على:\n";
            
            predictions.forEach(pred => {
                // رسم مربع حول الجسم المحدد
                const [x, y, width, height] = pred.bbox;
                ctx.strokeStyle = "red";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, width, height);
                
                // كتابة اسم الجسم ونسبة الدقة
                ctx.fillStyle = "red";
                ctx.font = "16px Arial";
                ctx.fillText(`${pred.class} (${Math.round(pred.score * 100)}%)`, x, y > 10 ? y - 5 : y + 15);
                
                resultsText += `- ${pred.class} (${Math.round(pred.score * 100)}%)\n`;
            });
            
            if(predictions.length === 0) {
                resultsText = "لم يتم التعرف على أي شيء في هذه اللقطة.";
            }
            resultsDiv.innerText = resultsText;
        }

        // 5. تشغيل التطبيق
        async function main() {
            await setupCamera();
            const model = await loadModel();
            detectFrame(model);
        }

        main();
    </script>
</body>
</html>
